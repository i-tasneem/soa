name: 🔄 Auto-Refresh Instruments

on:
  schedule:
    - cron: '0 1 * * *'  # Run at 6 AM UTC every day
  workflow_dispatch:     # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📚 Install dependencies
        run: npm install

      - name: 🏗️ Build instruments.json
        run: npm run build

      - name: 📝 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instruments.json data/instruments.meta.json
          git diff --cached --exit-code || (git commit -m "🔄 Auto-refresh instruments ($(date -u +'%Y-%m-%d %H:%M UTC'))" && git push)
