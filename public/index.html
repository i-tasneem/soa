<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050810">
<title>SOA Trader</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--void:#03050d;--bg:#070b18;--bg2:#0d1428;--bg3:#111d38;--border:#1e2d4a;--border2:#253558;--gold:#F0A500;--gold2:#FFc840;--gold-dim:#7a5200;--gold-bg:#1a0f00;--green:#00e5a0;--green-bg:#001f14;--green-dim:#005535;--red:#ff3d5a;--red-bg:#1f0010;--red-dim:#7a0025;--blue:#4da6ff;--blue-bg:#001a3a;--amber:#f0a030;--amber-bg:#1a0e00;--text:#d8e4f0;--text2:#6a85a8;--text3:#344d6a;--mono:'Space Mono',monospace;--display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;--r:8px;--rx:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--void);color:var(--text);font-family:var(--body);overflow:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
#app::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse,rgba(240,165,0,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.hdr{position:relative;z-index:10;padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(7,11,24,1) 0%,rgba(7,11,24,0.95) 100%)}
.logo-wrap{display:flex;flex-direction:column;gap:1px}
.logo{font-family:var(--display);font-size:24px;letter-spacing:3px;color:var(--gold);line-height:1;text-shadow:0 0 20px rgba(240,165,0,0.3)}
.logo-sub{font-size:8px;letter-spacing:3px;color:var(--text3);font-family:var(--mono);text-transform:uppercase}
.clock-wrap{text-align:right}
.clock{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px;line-height:1}
.date-line{font-size:8px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-top:2px}
.inst-bar{position:relative;z-index:10;display:flex;gap:4px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.inst-bar::-webkit-scrollbar{display:none}
.inst-btn{flex-shrink:0;padding:5px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text3);font-family:var(--mono);font-size:9px;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;white-space:nowrap;position:relative}
.inst-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg);box-shadow:0 0 8px rgba(240,165,0,0.15)}
.inst-btn.flash{animation:tabFlash 0.6s ease 3}
.inst-btn .inst-badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--red);color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;opacity:0;transition:opacity 0.3s}
.inst-btn .inst-badge.show{opacity:1}
@keyframes tabFlash{0%,100%{border-color:var(--border);box-shadow:none}50%{border-color:var(--gold);box-shadow:0 0 12px rgba(240,165,0,0.4)}}
.ticker{position:relative;z-index:10;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:12px}
.ticker-price{font-family:var(--display);font-size:28px;letter-spacing:2px;color:var(--gold);line-height:1;text-shadow:0 0 15px rgba(240,165,0,0.2)}
.ticker-meta{display:flex;flex-direction:column;gap:2px}
.ticker-chg{font-family:var(--mono);font-size:12px;font-weight:700}
.ticker-label{font-size:9px;color:var(--text3);letter-spacing:1px;font-family:var(--mono)}
.ticker-divider{width:1px;height:32px;background:var(--border2);margin:0 4px}
.ticker-stat{display:flex;flex-direction:column;gap:2px}
.ts-val{font-family:var(--mono);font-size:11px;color:var(--text)}
.ts-label{font-size:8px;color:var(--text3);letter-spacing:1px}
.conn-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.conn-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:breathe 2s ease-in-out infinite}
.conn-dot.err{background:var(--red);box-shadow:0 0 8px var(--red)}
.conn-dot.wait{background:var(--amber);box-shadow:0 0 8px var(--amber)}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.4}}
.sribbon{position:relative;z-index:10;padding:6px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background 0.6s}
.sribbon-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:breathe 2s infinite}
.sribbon-label{font-family:var(--display);font-size:16px;letter-spacing:2px;line-height:1}
.sribbon-desc{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:auto}
.sribbon-timer{font-family:var(--mono);font-size:11px;color:var(--gold);font-weight:700}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:5}
.content::-webkit-scrollbar{width:2px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pane{display:none;padding:14px 16px 20px;animation:fadeIn 0.2s ease}
.pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.tabs{position:relative;z-index:10;display:flex;border-top:1px solid var(--border);background:var(--bg2);padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 7px;border:none;background:transparent;color:var(--text3);font-family:var(--mono);font-size:8px;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;position:relative}
.tab-icon{font-size:17px;line-height:1}
.tab::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1.5px;background:var(--gold);transform:scaleX(0);transition:transform 0.3s;border-radius:0 0 2px 2px}
.tab.active{color:var(--gold)}
.tab.active::after{transform:scaleX(1)}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-title{font-family:var(--display);font-size:18px;letter-spacing:2px;color:var(--text);line-height:1}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sec-tag{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px}
.inst-card{border-radius:var(--rx);padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.inst-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.inst-card.gold{background:var(--gold-bg);border:1px solid var(--gold-dim)}
.inst-card.gold::before{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.inst-card.green{background:var(--green-bg);border:1px solid var(--green-dim)}
.inst-card.green::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.inst-card.red{background:var(--red-bg);border:1px solid var(--red-dim)}
.inst-card.red::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.inst-title{font-family:var(--display);font-size:20px;letter-spacing:2px;margin-bottom:8px;line-height:1}
.inst-body{font-size:12px;color:var(--text2);line-height:1.8;font-family:var(--body)}
.inst-body b{color:var(--text);font-weight:600}
.signal{border-radius:var(--rx);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;border:1px solid}
.signal.go{background:var(--green-bg);border-color:var(--green-dim)}
.signal.no{background:var(--red-bg);border-color:var(--red-dim)}
.signal.caution{background:var(--amber-bg);border-color:var(--gold-dim)}
.signal-icon{font-size:20px}
.signal-text{font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:0.5px}
.signal-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:12px;position:relative;overflow:hidden}
.stat-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.stat-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-family:var(--mono);margin-bottom:6px}
.stat-val{font-family:var(--display);font-size:26px;letter-spacing:1px;line-height:1}
.stat-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.chain-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);overflow:hidden;margin-bottom:12px}
.chain-hdr{display:grid;grid-template-columns:1fr 80px 1fr;padding:7px 10px;background:var(--bg3);border-bottom:1px solid var(--border)}
.chain-hdr span{font-size:8px;color:var(--text3);letter-spacing:1.5px;font-family:var(--mono)}
.chain-hdr span:nth-child(2){text-align:center}
.chain-hdr span:nth-child(3){text-align:right}
.chain-row{display:grid;grid-template-columns:1fr 80px 1fr;padding:8px 10px;border-bottom:1px solid var(--border);transition:background 0.2s;align-items:center}
.chain-row:last-child{border:none}
.chain-row.atm{background:linear-gradient(90deg,rgba(240,165,0,0.05),rgba(240,165,0,0.1),rgba(240,165,0,0.05));border-top:1px solid var(--gold-dim);border-bottom:1px solid var(--gold-dim)}
.call-side{display:flex;flex-direction:column;gap:2px}
.put-side{display:flex;flex-direction:column;gap:2px;text-align:right;align-items:flex-end}
.chain-prem{font-family:var(--mono);font-size:14px;font-weight:700}
.chain-prem.c{color:var(--green)}
.chain-prem.p{color:var(--red)}
.chain-strike{text-align:center}
.strike-val{font-family:var(--display);font-size:16px;letter-spacing:1px;color:var(--text);line-height:1}
.strike-badge{display:inline-block;margin-top:2px;padding:1px 6px;border-radius:3px;font-size:8px;letter-spacing:1px;font-family:var(--mono)}
.sb-atm{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim)}
.sb-itm{background:var(--green-bg);color:var(--green)}
.sb-otm{background:var(--bg3);color:var(--text3)}
.alert{border-radius:var(--rx);padding:10px 14px;margin-bottom:12px;font-size:11px;line-height:1.6;font-family:var(--mono);border:1px solid}
.alert.gold{background:var(--gold-bg);border-color:var(--gold-dim);color:var(--gold)}
.alert.red{background:var(--red-bg);border-color:var(--red-dim);color:var(--red)}
.alert.green{background:var(--green-bg);border-color:var(--green-dim);color:var(--green)}
.conn-banner{background:var(--red-bg);border:1px solid var(--red-dim);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:11px;color:var(--red);font-family:var(--mono);display:flex;align-items:center;gap:8px}
.conn-banner.waiting{background:var(--amber-bg);border-color:var(--gold-dim);color:var(--gold)}
.conn-banner.live{background:var(--green-bg);border-color:var(--green-dim);color:var(--green)}
.skeleton{background:linear-gradient(90deg,var(--bg2),var(--bg3),var(--bg2));background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:14px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ana-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px}
.ana-label{font-size:8px;color:var(--text3);letter-spacing:1px;font-family:var(--mono);margin-bottom:3px}
.ana-val{font-size:13px;font-family:var(--mono);font-weight:bold;color:var(--text)}
.ana-val.bull{color:var(--green)}.ana-val.bear{color:var(--red)}.ana-val.neu{color:var(--amber)}
.trade-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);overflow:hidden;margin-bottom:10px}
.trade-hdr{padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.trade-hdr-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-family:var(--mono)}
.trade-status{font-size:9px;font-family:var(--mono);font-weight:bold}
.trade-row{display:flex;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border);font-size:11px}
.trade-row:last-child{border:none}
.trade-key{color:var(--text2)}.trade-val{font-family:var(--mono);font-weight:bold}
.state-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:bold;font-family:var(--mono);letter-spacing:0.5px;margin-bottom:10px}
.sp-bull{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.sp-bear{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}
.sp-side{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.sp-vol{background:var(--amber-bg);color:var(--amber);border:1px solid var(--gold-dim)}
.sigcard{border-radius:var(--rx);border:1px solid var(--border);background:var(--bg2);margin-bottom:10px;overflow:hidden;position:relative}
.sigcard.sigcard-ce{border-left:3px solid var(--green)}
.sigcard.sigcard-pe{border-left:3px solid var(--red)}
.sigcard-head{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px 8px}
.sigcard-type{font-family:var(--display);font-size:20px;letter-spacing:2px;line-height:1}
.sigcard-type.ce{color:var(--green)}.sigcard-type.pe{color:var(--red)}
.sigcard-time{font-size:9px;color:var(--text3);font-family:var(--mono);text-align:right}
.sigcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 12px 10px}
.sigcard-cell{background:var(--bg3);border-radius:var(--r);padding:6px 8px}
.sigcard-cell .cell-lbl{font-size:8px;color:var(--text3);letter-spacing:1px;font-family:var(--mono)}
.sigcard-cell .cell-val{font-size:12px;font-family:var(--mono);font-weight:bold;color:var(--text)}
.sigcard-cell .cell-val.green{color:var(--green)}.sigcard-cell .cell-val.red{color:var(--red)}.sigcard-cell .cell-val.gold{color:var(--gold)}
.mini-sig-feed{max-height:300px;overflow-y:auto;margin-bottom:12px}
.mini-sig-feed::-webkit-scrollbar{width:2px}
.mini-sig-feed::-webkit-scrollbar-thumb{background:var(--border2)}
.mini-sig-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;font-family:var(--mono);cursor:pointer;transition:background 0.2s}
.mini-sig-item:hover{background:var(--bg3)}
.mini-sig-item:last-child{border:none}
.mini-sig-badge{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:0.5px}
.mini-sig-badge.ce{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.mini-sig-badge.pe{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}
.mini-sig-info{flex:1}
.mini-sig-inst{color:var(--text3);font-size:8px;margin-bottom:1px}
.mini-sig-strike{color:var(--text);font-weight:700}
.mini-sig-time{color:var(--text3);font-size:9px}
.oi-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:12px;margin-bottom:12px}
.oi-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oi-title{font-family:var(--display);font-size:14px;letter-spacing:1.5px;color:var(--text)}
.oi-sub{font-size:9px;color:var(--text3);font-family:var(--mono)}
.oi-wall{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;font-family:var(--mono)}
.oi-wall:last-child{border:none}
.oi-wall-label{color:var(--text3)}
.oi-wall-val{font-weight:700}
.oi-wall-val.green{color:var(--green)}
.oi-wall-val.red{color:var(--red)}
.oi-wall-val.gold{color:var(--gold)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:0.5px}
.badge.inst-nse{background:rgba(0,229,160,0.1);color:var(--green);border:1px solid var(--green-dim)}
.badge.inst-bse{background:rgba(77,166,255,0.1);color:var(--blue);border:1px solid rgba(77,166,255,0.3)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo-wrap">
      <div class="logo">SOA TRADER</div>
      <div class="logo-sub">MULTI-INSTRUMENT</div>
    </div>
    <div class="clock-wrap">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-line" id="datestr">IST</div>
    </div>
  </div>
  <div class="inst-bar" id="inst-bar">
    <button class="inst-btn active" data-inst="SENSEX" onclick="selectInstrument('SENSEX')">SENSEX<span class="inst-badge" id="badge-SENSEX">0</span></button>
    <button class="inst-btn" data-inst="NIFTY" onclick="selectInstrument('NIFTY')">NIFTY<span class="inst-badge" id="badge-NIFTY">0</span></button>
    <button class="inst-btn" data-inst="BANKNIFTY" onclick="selectInstrument('BANKNIFTY')">BANKNIFTY<span class="inst-badge" id="badge-BANKNIFTY">0</span></button>
    <button class="inst-btn" data-inst="FINNIFTY" onclick="selectInstrument('FINNIFTY')">FINNIFTY<span class="inst-badge" id="badge-FINNIFTY">0</span></button>
    <button class="inst-btn" data-inst="BANKEX" onclick="selectInstrument('BANKEX')">BANKEX<span class="inst-badge" id="badge-BANKEX">0</span></button>
    <button class="inst-btn" data-inst="STOCKS" onclick="selectInstrument('STOCKS')">STOCKS<span class="inst-badge" id="badge-STOCKS">0</span></button>
  </div>
  <div class="ticker" id="ticker-bar">
    <div>
      <div class="ticker-label" id="ticker-name">BSE SENSEX</div>
      <div class="ticker-price" id="ticker-price">--,---</div>
    </div>
    <div class="ticker-meta">
      <div class="ticker-chg" id="ticker-chg">-- --</div>
      <div class="ticker-label" id="ticker-pct">-- %</div>
    </div>
    <div class="ticker-divider"></div>
    <div class="ticker-stat">
      <div class="ts-val" id="ticker-call">--</div>
      <div class="ts-label">ATM CALL</div>
    </div>
    <div class="ticker-stat">
      <div class="ts-val" id="ticker-put">--</div>
      <div class="ts-label">ATM PUT</div>
    </div>
    <div class="ticker-stat">
      <div class="ts-val" id="ticker-strike">--</div>
      <div class="ts-label">ATM STRIKE</div>
    </div>
    <div class="conn-dot wait" id="conn-dot" title="Connecting..."></div>
  </div>
  <div class="sribbon" id="sribbon">
    <div class="sribbon-dot" id="sribbon-dot"></div>
    <div class="sribbon-label" id="sribbon-label">LOADING</div>
    <div class="sribbon-desc" id="sribbon-desc"></div>
    <div class="sribbon-timer" id="sribbon-timer"></div>
  </div>
  <div class="content">
    <div class="pane active" id="pane-dash">
      <div id="conn-banner-area"></div>
      <div class="sec-hdr">
        <div class="sec-title">LIVE SIGNALS</div>
        <div class="sec-line"></div>
        <div class="sec-tag" id="sig-count-badge">0</div>
      </div>
      <div class="mini-sig-feed" id="mini-sig-feed">
        <div style="text-align:center;padding:40px 20px;color:var(--text3);font-family:var(--mono);font-size:11px">No signals yet. Waiting for market data...</div>
      </div>
      <div id="signal-area"></div>
      <div id="analysis-area"></div>
      <div id="oi-panel-area"></div>
      <div id="inst-area"></div>
    </div>
    <div class="pane" id="pane-mkt">
      <div id="mkt-area"><div class="skeleton" style="height:120px;margin-bottom:12px"></div><div class="skeleton"></div><div class="skeleton"></div></div>
    </div>
    <div class="pane" id="pane-calc">
      <div class="sec-hdr"><div class="sec-title">CAPITAL CALC</div><div class="sec-line"></div></div>
      <div style="padding:20px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px">Calculator coming soon...</div>
    </div>
    <div class="pane" id="pane-strat">
      <div style="padding:20px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px">Strategy guide coming soon...</div>
    </div>
    <div class="pane" id="pane-sig">
      <div id="sig-summary-bar" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"></div>
      <div id="sig-log"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-dash" onclick="switchTab('dash')">
      <span class="tab-icon">&#127968;</span>HOME<span id="signal-badge" style="display:none;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:8px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;vertical-align:top"></span>
    </button>
    <button class="tab" id="tab-mkt" onclick="switchTab('mkt')">
      <span class="tab-icon">&#128200;</span>MARKET
    </button>
    <button class="tab" id="tab-calc" onclick="switchTab('calc')">
      <span class="tab-icon">&#129518;</span>CALC
    </button>
    <button class="tab" id="tab-strat" onclick="switchTab('strat')">
      <span class="tab-icon">&#128203;</span>RULES
    </button>
    <button class="tab" id="tab-sig" onclick="switchTab('sig')">
      <span class="tab-icon">&#128680;</span>SIGNALS<span id="sig-count-badge" style="display:none;background:var(--red);color:#fff;border-radius:10px;padding:0 4px;font-size:8px;min-width:14px;height:14px;line-height:14px;margin-left:2px;vertical-align:top"></span>
    </button>
  </div>
</div>
<script>
// ===== INSTRUMENT CONFIG =====
var INSTRUMENTS = {
  SENSEX:    { name: 'SENSEX',    market: 'BSE', exchange: 'BSE', token: '99919000', strikeStep: 100, lotSize: 20 },
  NIFTY:     { name: 'NIFTY',     market: 'NSE', exchange: 'NSE', token: '99926000', strikeStep: 50,  lotSize: 25 },
  BANKNIFTY: { name: 'BANKNIFTY', market: 'NSE', exchange: 'NSE', token: '99926009', strikeStep: 100, lotSize: 15 },
  FINNIFTY:  { name: 'FINNIFTY',  market: 'NSE', exchange: 'NSE', token: '99926037', strikeStep: 50,  lotSize: 25 },
  BANKEX:    { name: 'BANKEX',    market: 'BSE', exchange: 'BSE', token: '99919001', strikeStep: 100, lotSize: 10 },
  STOCKS:    { name: 'STOCKS',    market: 'NSE', exchange: 'NSE', token: null,       strikeStep: null, lotSize: null },
};

// ===== STATE =====
var currentTab = 'dash';
var selectedInstrument = 'SENSEX';
var wsConn = null;
var connStatus = 'waiting';
var cfg = { trading: { defaultLots:15, defaultTarget:25, defaultStopLoss:20, defaultMonthlyGoal:35000 } };

var instState = {};
Object.keys(INSTRUMENTS).forEach(function(id) {
  instState[id] = { ltp: null, basePrice: null, optionChain: [], atmStrike: null, atmCall: null, atmPut: null, analysis: null, trade: null, oiWalls: null, signals: [], lastUpdate: 0 };
});

var allSignals = [];
var signalHistoryById = new Map();

// ===== WEBSOCKET =====
function connectWS() {
  try {
    var wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    wsConn = new WebSocket(wsProto + '//' + window.location.host);

    wsConn.onopen = function() {
      console.log('WS connected');
      updateConnStatus('waiting', 'Authenticating...');
      try { wsConn.send(JSON.stringify({ type: 'GET_INIT_STATE' })); } catch(e) {}
    };

    wsConn.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        handleMessage(msg);
      } catch(err) {
        console.warn('WS parse error:', err);
      }
    };

    wsConn.onerror = function() {
      updateConnStatus('error', 'Server offline');
    };

    wsConn.onclose = function() {
      updateConnStatus('error', 'Reconnecting...');
      setTimeout(connectWS, 3000);
    };
  } catch(err) {
    updateConnStatus('error', 'Server not running');
    setTimeout(connectWS, 5000);
  }
}

function handleMessage(msg) {
  // Legacy compatibility
  if (msg.type === 'SENSEX_LTP' && msg.ltp) {
    updateInstrumentLTP('SENSEX', msg.ltp);
    return;
  }
  if (msg.type === 'OPTION_CHAIN' && msg.data) {
    updateInstrumentChain('SENSEX', msg.data);
    return;
  }
  if (msg.type === 'INIT' && msg.snapshot) {
    if (msg.config) cfg = msg.config;
    if (msg.snapshot.oi) instState.SENSEX.oiWalls = msg.snapshot.oi;
    if (msg.snapshot.trade) instState.SENSEX.trade = msg.snapshot.trade;
    if (msg.pastSignals) {
      msg.pastSignals.forEach(function(sig) { addSignal(Object.assign({}, sig, { instrument: 'SENSEX' })); });
    }
    updateConnStatus('live', 'Angel One Live');
    renderAll();
    return;
  }

  // Multi-instrument protocol
  switch(msg.type) {
    case 'INIT_STATE':
      if (msg.data) {
        if (msg.data.config) cfg = msg.data.config;
        if (msg.data.instruments) {
          Object.entries(msg.data.instruments).forEach(function(entry) {
            var id = entry[0], data = entry[1];
            if (instState[id]) {
              instState[id].ltp = data.price || data.lastSensex || null;
              instState[id].analysis = data;
              instState[id].trade = data.trade || null;
              instState[id].oiWalls = data.oi || null;
              if (data.atmStrike) instState[id].atmStrike = data.atmStrike;
            }
          });
        }
        updateConnStatus('live', 'Angel One Live');
        renderAll();
      }
      break;

    case 'AUTH_STATUS':
      updateConnStatus(msg.status === 'connected' ? 'live' : 'error', msg.message);
      break;

    case 'TICK':
    case 'SENSEX_LTP':
      if (msg.instrument && msg.data && msg.data.ltp) {
        updateInstrumentLTP(msg.instrument, msg.data.ltp);
      } else if (msg.ltp) {
        updateInstrumentLTP('SENSEX', msg.ltp);
      }
      break;

    case 'OPTION_CHAIN':
      if (msg.instrument && msg.data) {
        updateInstrumentChain(msg.instrument, msg.data);
      }
      break;

    case 'SIGNAL':
      if (msg.instrument && msg.data) {
        addSignal(Object.assign({}, msg.data, { instrument: msg.instrument, market: msg.market || (INSTRUMENTS[msg.instrument] ? INSTRUMENTS[msg.instrument].market : 'NSE') }));
        flashInstrumentTab(msg.instrument);
        playSignalSound(msg.data.type);
        if (navigator.vibrate) navigator.vibrate(200);
      }
      break;

    case 'TRADE_OPEN':
      if (msg.instrument && msg.data) {
        instState[msg.instrument].trade = msg.data;
        renderAll();
      }
      break;

    case 'TRADE_CLOSED':
      if (msg.instrument && msg.data) {
        instState[msg.instrument].trade = null;
        if (msg.data.signalId && signalHistoryById.has(msg.data.signalId)) {
          var sig = signalHistoryById.get(msg.data.signalId);
          sig.tradeStatus = msg.data.status;
          sig.pnl = msg.data.pnl;
          signalHistoryById.set(sig.id, sig);
        }
        renderAll();
      }
      break;

    case 'ANALYSIS':
      if (msg.instrument && msg.data) {
        instState[msg.instrument].analysis = msg.data;
        instState[msg.instrument].ltp = msg.data.price || instState[msg.instrument].ltp;
        instState[msg.instrument].oiWalls = msg.data.oi || instState[msg.instrument].oiWalls;
        if (msg.data.atmStrike) instState[msg.instrument].atmStrike = msg.data.atmStrike;
        renderAll();
      }
      break;

    case 'OI_WALLS':
      if (msg.instrument && msg.data) {
        instState[msg.instrument].oiWalls = msg.data;
        if (currentTab === 'dash') renderOIWalls();
      }
      break;

    case 'WS_ERROR':
      updateConnStatus('error', msg.message);
      break;
  }
}

function updateInstrumentLTP(instrumentId, ltp) {
  if (!instState[instrumentId]) return;
  var st = instState[instrumentId];
  st.ltp = ltp;
  if (!st.basePrice) st.basePrice = ltp;
  st.lastUpdate = Date.now();
  var step = INSTRUMENTS[instrumentId].strikeStep || 100;
  st.atmStrike = Math.round(ltp / step) * step;
  if (currentTab === 'dash' || currentTab === 'mkt') {
    renderTicker();
    if (currentTab === 'mkt') renderMarket();
  }
}

function updateInstrumentChain(instrumentId, data) {
  if (!instState[instrumentId]) return;
  instState[instrumentId].optionChain = data;
  if (Array.isArray(data) && instState[instrumentId].atmStrike) {
    var atm = data.find(function(r) { return r.strikePrice == instState[instrumentId].atmStrike; });
    if (atm) {
      instState[instrumentId].atmCall = atm.CE ? atm.CE.ltp : null;
      instState[instrumentId].atmPut = atm.PE ? atm.PE.ltp : null;
    }
  }
  if (currentTab === 'mkt') renderMarket();
  if (currentTab === 'dash') renderTicker();
}

function addSignal(sig) {
  if (!sig || !sig.id) return;
  var existing = signalHistoryById.get(sig.id);
  var merged = existing ? Object.assign({}, existing, sig) : sig;
  signalHistoryById.set(sig.id, merged);
  var idx = allSignals.findIndex(function(s) { return s.id === sig.id; });
  if (idx >= 0) allSignals[idx] = merged;
  else allSignals.unshift(merged);
  updateSigBadge();
  if (currentTab === 'dash') renderMiniSigFeed();
  if (currentTab === 'sig') renderSignalsTab();
}

function flashInstrumentTab(instrumentId) {
  if (instrumentId === selectedInstrument) return;
  var btn = document.querySelector('.inst-btn[data-inst="' + instrumentId + '"]');
  if (btn) {
    btn.classList.add('flash');
    var badge = btn.querySelector('.inst-badge');
    if (badge) {
      var count = parseInt(badge.textContent) || 0;
      badge.textContent = count + 1;
      badge.classList.add('show');
    }
    setTimeout(function() { btn.classList.remove('flash'); }, 2000);
  }
}

function selectInstrument(id) {
  selectedInstrument = id;
  document.querySelectorAll('.inst-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.inst-btn[data-inst="' + id + '"]');
  if (btn) btn.classList.add('active');
  var badge = document.getElementById('badge-' + id);
  if (badge) {
    badge.textContent = '0';
    badge.classList.remove('show');
  }
  renderTicker();
  if (currentTab === 'dash') {
    renderAnalysis();
    renderOIWalls();
    renderTradeTracker();
  }
  if (currentTab === 'mkt') renderMarket();
}

function playSignalSound(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var freqs = type === 'BUY_CE' ? [523, 659, 784] : [784, 659, 523];
    freqs.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.35);
    });
  } catch(e) {}
}

// ===== RENDER FUNCTIONS =====
function renderAll() {
  renderTicker();
  if (currentTab === 'dash') {
    renderAnalysis();
    renderOIWalls();
    renderTradeTracker();
    renderMiniSigFeed();
  }
  if (currentTab === 'mkt') renderMarket();
  if (currentTab === 'sig') renderSignalsTab();
}

function renderTicker() {
  var st = instState[selectedInstrument];
  if (!st) return;
  var instCfg = INSTRUMENTS[selectedInstrument];
  var nameEl = document.getElementById('ticker-name');
  if (nameEl) nameEl.textContent = instCfg.market + ' ' + instCfg.name;
  if (st.ltp) {
    var priceEl = document.getElementById('ticker-price');
    if (priceEl) priceEl.textContent = st.ltp.toLocaleString('en-IN', {minimumFractionDigits:2});
    var chg = st.ltp - (st.basePrice || st.ltp);
    var pct = st.basePrice ? (chg / st.basePrice * 100).toFixed(2) : '0.00';
    var up = chg >= 0;
    var chgEl = document.getElementById('ticker-chg');
    if (chgEl) {
      chgEl.textContent = (up ? '+' : '') + chg.toFixed(2);
      chgEl.style.color = up ? 'var(--green)' : 'var(--red)';
    }
    var pctEl = document.getElementById('ticker-pct');
    if (pctEl) pctEl.textContent = (up ? '+' : '') + pct + '%';
    var callEl = document.getElementById('ticker-call');
    if (callEl) callEl.textContent = st.atmCall ? 'Rs' + st.atmCall : '--';
    var putEl = document.getElementById('ticker-put');
    if (putEl) putEl.textContent = st.atmPut ? 'Rs' + st.atmPut : '--';
    var strikeEl = document.getElementById('ticker-strike');
    if (strikeEl) strikeEl.textContent = st.atmStrike || '--';
  }
}

function renderAnalysis() {
  var st = instState[selectedInstrument];
  var area = document.getElementById('analysis-area');
  if (!area) return;
  if (!st || !st.analysis || !st.analysis.indicators) {
    area.innerHTML = '';
    return;
  }
  var ind = st.analysis.indicators;
  var state = st.analysis.state;
  var signals = st.analysis.signals || [];
  var stateColors = { TRENDING_BULLISH: 'sp-bull', BREAKOUT: 'sp-bull', TRENDING_BEARISH: 'sp-bear', SIDEWAYS: 'sp-side', UNKNOWN: 'sp-side', VOLATILE: 'sp-vol', REVERSAL: 'sp-vol' };
  var stateEmoji = { TRENDING_BULLISH: '&#9650;', TRENDING_BEARISH: '&#9660;', SIDEWAYS: '&#9472;', VOLATILE: '&#9889;', BREAKOUT: '&#128640;', REVERSAL: '&#8617;', UNKNOWN: '?' };
  var stateClass = stateColors[state && state.state] || 'sp-side';
  var stateIco = stateEmoji[state && state.state] || '?';
  area.innerHTML = '<div class="sec-hdr"><div class="sec-title">LIVE ANALYSIS - ' + selectedInstrument + '</div><div class="sec-line"></div><div class="sec-tag">Signals: ' + (signals.length || 0) + '/5</div></div>' +
    '<div class="state-pill ' + stateClass + '">' + stateIco + ' ' + (state && state.state ? state.state.replace(/_/g, ' ') : 'UNKNOWN') + '</div>' +
    '<div class="analysis-grid">' +
    '<div class="ana-box"><div class="ana-label">EMA 5</div><div class="ana-val">' + (ind.ema5 ? ind.ema5.toLocaleString('en-IN') : '--') + '</div></div>' +
    '<div class="ana-box"><div class="ana-label">EMA 9</div><div class="ana-val">' + (ind.ema9 ? ind.ema9.toLocaleString('en-IN') : '--') + '</div></div>' +
    '<div class="ana-box"><div class="ana-label">VWAP</div><div class="ana-val ' + (ind.bias && ind.bias.aboveVWAP ? 'bull' : 'bear') + '">' + (ind.vwap ? ind.vwap.toLocaleString('en-IN') : '--') + '</div></div>' +
    '<div class="ana-box"><div class="ana-label">BB WIDTH</div><div class="ana-val ' + (ind.bb && ind.bb.squeeze ? 'bear' : 'bull') + '">' + (ind.bb && ind.bb.bw ? ind.bb.bw.toFixed(2) + '%' : '--') + '</div></div>' +
    '<div class="ana-box"><div class="ana-label">BIAS</div><div class="ana-val ' + (ind.bias && ind.bias.bullishEMA ? 'bull' : ind.bias && ind.bias.bearishEMA ? 'bear' : 'neu') + '">' + (ind.bias && ind.bias.bullishEMA ? 'BULLISH' : ind.bias && ind.bias.bearishEMA ? 'BEARISH' : 'NEUTRAL') + '</div></div>' +
    '<div class="ana-box"><div class="ana-label">BB SQUEEZE</div><div class="ana-val ' + (ind.bb && ind.bb.squeeze ? 'bear' : 'bull') + '">' + (ind.bb && ind.bb.squeeze ? 'YES' : 'NO') + '</div></div>' +
    '</div>';
  renderTradeTracker();
}

function renderTradeTracker() {
  var st = instState[selectedInstrument];
  var area = document.getElementById('signal-area');
  if (!area) return;
  if (!st || !st.trade) {
    area.innerHTML = '';
    return;
  }
  var trade = st.trade;
  var isCE = trade.activeTrade && trade.activeTrade.type === 'BUY_CE';
  var html = '<div class="trade-box"><div class="trade-hdr"><span class="trade-hdr-label">ACTIVE TRADE - ' + selectedInstrument + '</span>' +
    '<span class="trade-status" style="color:' + (trade.dailyPnL >= 0 ? 'var(--green)' : 'var(--red)') + '">Daily P&L: Rs' + (trade.dailyPnL || 0) + '</span></div>';
  if (trade.activeTrade) {
    html += '<div class="trade-row"><span class="trade-key">Type</span><span class="trade-val" style="color:' + (isCE ? 'var(--green)' : 'var(--red)') + '">' + trade.activeTrade.type + '</span></div>';
    html += '<div class="trade-row"><span class="trade-key">Entry</span><span class="trade-val">Rs' + trade.activeTrade.entryPremium + '</span></div>';
    html += '<div class="trade-row"><span class="trade-key">Current</span><span class="trade-val">Rs' + trade.activeTrade.currentPremium + '</span></div>';
    html += '<div class="trade-row"><span class="trade-key">Target</span><span class="trade-val" style="color:var(--green)">Rs' + trade.activeTrade.target + '</span></div>';
    html += '<div class="trade-row"><span class="trade-key">SL</span><span class="trade-val" style="color:var(--red)">Rs' + (trade.activeTrade.trailing ? trade.activeTrade.trailSL + ' (Trail)' : trade.activeTrade.sl) + '</span></div>';
    html += '<div class="trade-row"><span class="trade-key">Unrealised P&L</span><span class="trade-val" style="color:' + ((trade.activeTrade.unrealisedPnL || 0) >= 0 ? 'var(--green)' : 'var(--red)') + '">Rs' + (trade.activeTrade.unrealisedPnL || 0) + '</span></div>';
  } else {
    html += '<div style="padding:14px;text-align:center;font-size:11px;color:var(--text3)">No active trade</div>';
  }
  html += '<div class="trade-row"><span class="trade-key">Today: W/L</span><span class="trade-val">' + (trade.wins || 0) + 'W / ' + (trade.losses || 0) + 'L</span></div></div>';
  area.innerHTML = html;
}

function renderOIWalls() {
  var st = instState[selectedInstrument];
  var area = document.getElementById('oi-panel-area');
  if (!area) return;
  if (!st || !st.oiWalls) {
    area.innerHTML = '';
    return;
  }
  var oi = st.oiWalls;
  var existing = oi.existingSR || {};
  var html = '<div class="oi-panel"><div class="oi-hdr"><div class="oi-title">OI WALLS - ' + selectedInstrument + '</div>' +
    '<div class="oi-sub">PCR: ' + (oi.pcr || '--') + ' | ' + (oi.pcrBias || 'NEUTRAL') + '</div></div>';
  html += '<div class="oi-wall"><span class="oi-wall-label">Support (Max OI)</span><span class="oi-wall-val green">' + (existing.supportMaxOI ? existing.supportMaxOI.toLocaleString('en-IN') : '--') + '</span></div>';
  html += '<div class="oi-wall"><span class="oi-wall-label">Resistance (Max OI)</span><span class="oi-wall-val red">' + (existing.resistanceMaxOI ? existing.resistanceMaxOI.toLocaleString('en-IN') : '--') + '</span></div>';
  html += '<div class="oi-wall"><span class="oi-wall-label">Nearest Support</span><span class="oi-wall-val green">' + (existing.supportNearest ? existing.supportNearest.toLocaleString('en-IN') : '--') + '</span></div>';
  html += '<div class="oi-wall"><span class="oi-wall-label">Nearest Resistance</span><span class="oi-wall-val red">' + (existing.resistanceNearest ? existing.resistanceNearest.toLocaleString('en-IN') : '--') + '</span></div>';
  if (oi.isPinned) html += '<div style="margin-top:6px;font-size:10px;font-family:var(--mono);color:var(--gold)">&#9888; PIN DETECTED</div>';
  html += '</div>';
  area.innerHTML = html;
}

function renderMiniSigFeed() {
  var feed = document.getElementById('mini-sig-feed');
  if (!feed) return;
  var recent = allSignals.slice(0, 5);
  if (recent.length === 0) {
    feed.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text3);font-family:var(--mono);font-size:11px">No signals yet. Waiting for market data...</div>';
    return;
  }
  feed.innerHTML = recent.map(function(sig) {
    var isCE = sig.type === 'BUY_CE';
    var inst = sig.instrument || 'SENSEX';
    var market = sig.market || (INSTRUMENTS[inst] ? INSTRUMENTS[inst].market : 'NSE');
    return '<div class="mini-sig-item" onclick="selectInstrument(\'' + inst + '\');switchTab(\'sig\')">' +
      '<span class="mini-sig-badge ' + (isCE ? 'ce' : 'pe') + '">' + (isCE ? 'CE' : 'PE') + '</span>' +
      '<div class="mini-sig-info"><div class="mini-sig-inst">' + inst + ' <span style="opacity:0.6">' + market + '</span></div>' +
      '<div class="mini-sig-strike">' + (sig.strike || '') + ' @ Rs' + (sig.entryPremium || sig.price || '--') + '</div></div>' +
      '<div class="mini-sig-time">' + (sig.timeStr || '') + '<br><span style="color:' + (sig.confidence >= 85 ? 'var(--green)' : sig.confidence >= 70 ? 'var(--amber)' : 'var(--red)') + '">' + sig.confidence + '%</span></div></div>';
  }).join('');
}

function renderMarket() {
  var st = instState[selectedInstrument];
  var area = document.getElementById('mkt-area');
  if (!area) return;
  var atm = st && st.atmStrike ? st.atmStrike : '--';
  var chainHTML = '';
  if (st && st.optionChain && st.optionChain.length > 0 && st.atmStrike) {
    var atmIdx = st.optionChain.findIndex(function(r) { return r.strikePrice >= st.atmStrike; });
    var start = Math.max(0, atmIdx - 3);
    var end = Math.min(st.optionChain.length, atmIdx + 4);
    var slice = st.optionChain.slice(start, end);
    chainHTML = '<div class="sec-hdr"><div class="sec-title">OPTION CHAIN - ' + selectedInstrument + '</div><div class="sec-line"></div><div class="sec-tag">' + (st.optionChain[0] && st.optionChain[0].CE ? st.optionChain[0].CE.expiry : 'WEEKLY') + '</div></div>' +
      '<div class="chain-wrap"><div class="chain-hdr"><span>CALL</span><span>STRIKE</span><span>PUT</span></div>' +
      slice.map(function(r) {
        var isAtm = r.strikePrice == st.atmStrike;
        var cls = isAtm ? 'sb-atm' : 'sb-otm';
        var cp = r.CE ? r.CE.ltp : '--';
        var pp = r.PE ? r.PE.ltp : '--';
        return '<div class="chain-row ' + (isAtm ? 'atm' : '') + '"><div class="call-side"><div class="chain-prem c">' + (typeof cp === 'number' ? cp.toFixed(2) : cp) + '</div></div>' +
          '<div class="chain-strike"><div class="strike-val">' + r.strikePrice.toLocaleString('en-IN') + '</div><span class="strike-badge ' + cls + '">' + (isAtm ? 'ATM' : 'OTM') + '</span></div>' +
          '<div class="put-side"><div class="chain-prem p">' + (typeof pp === 'number' ? pp.toFixed(2) : pp) + '</div></div></div>';
      }).join('') + '</div>';
  } else {
    chainHTML = '<div class="alert gold">&#9203; ' + (st && st.ltp ? 'Loading option chain...' : 'Waiting for data...') + '</div>';
  }
  area.innerHTML = '<div class="stat-grid"><div class="stat-box"><div class="stat-lbl">ATM STRIKE</div><div class="stat-val" style="color:var(--gold)">' + (atm.toLocaleString ? atm.toLocaleString('en-IN') : atm) + '</div><div class="stat-sub">' + selectedInstrument + '</div></div>' +
    '<div class="stat-box"><div class="stat-lbl">LTP</div><div class="stat-val" style="color:var(--gold);font-size:20px">' + (st && st.ltp ? st.ltp.toLocaleString('en-IN') : '--') + '</div><div class="stat-sub">' + (INSTRUMENTS[selectedInstrument] ? INSTRUMENTS[selectedInstrument].market : '') + '</div></div></div>' +
    '<div class="stat-grid"><div class="stat-box"><div class="stat-lbl">ATM CALL</div><div class="stat-val" style="color:var(--green)">' + (st && st.atmCall ? 'Rs' + st.atmCall : '--') + '</div></div>' +
    '<div class="stat-box"><div class="stat-lbl">ATM PUT</div><div class="stat-val" style="color:var(--red)">' + (st && st.atmPut ? 'Rs' + st.atmPut : '--') + '</div></div></div>' +
    '<div style="margin:14px 0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)"></div>' + chainHTML;
}

function renderSignalsTab() {
  renderSigSummary();
  renderSigLog();
}

function renderSigSummary() {
  var bar = document.getElementById('sig-summary-bar');
  if (!bar) return;
  var perInst = {};
  Object.keys(INSTRUMENTS).forEach(function(id) { perInst[id] = { fired: 0, near: 0, wins: 0, losses: 0 }; });
  allSignals.forEach(function(sig) {
    var inst = sig.instrument || 'SENSEX';
    if (!perInst[inst]) perInst[inst] = { fired: 0, near: 0, wins: 0, losses: 0 };
    if (sig.nearMiss) perInst[inst].near++;
    else {
      perInst[inst].fired++;
      if (sig.tradeStatus === 'WIN') perInst[inst].wins++;
      if (sig.tradeStatus === 'LOSS') perInst[inst].losses++;
    }
  });
  var totalFired = allSignals.filter(function(s) { return !s.nearMiss; }).length;
  var totalNear = allSignals.filter(function(s) { return s.nearMiss; }).length;
  var totalWins = allSignals.filter(function(s) { return s.tradeStatus === 'WIN'; }).length;
  var totalLosses = allSignals.filter(function(s) { return s.tradeStatus === 'LOSS'; }).length;
  var html = '<div class="sig-summary-chip" style="display:inline-flex;flex-direction:column;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:8px 14px;min-width:70px;flex:1"><span style="font-family:var(--mono);font-size:20px;font-weight:bold;line-height:1;color:var(--gold)">' + totalFired + '</span><span style="font-size:8px;color:var(--text3);letter-spacing:1px;font-family:var(--mono);margin-top:3px">ALL SIGNALS</span></div>';
  html += '<div class="sig-summary-chip" style="display:inline-flex;flex-direction:column;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:8px 14px;min-width:70px;flex:1"><span style="font-family:var(--mono);font-size:20px;font-weight:bold;line-height:1;color:var(--gold)">' + totalNear + '</span><span style="font-size:8px;color:var(--text3);letter-spacing:1px;font-family:var(--mono);margin-top:3px">NEAR MISS</span></div>';
  html += '<div class="sig-summary-chip" style="display:inline-flex;flex-direction:column;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:8px 14px;min-width:70px;flex:1"><span style="font-family:var(--mono);font-size:20px;font-weight:bold;line-height:1;color:var(--green)">' + totalWins + 'W <span style="color:var(--red)">' + totalLosses + 'L</span></span><span style="font-size:8px;color:var(--text3);letter-spacing:1px;font-family:var(--mono);margin-top:3px">W / L</span></div>';
  Object.entries(perInst).filter(function(e) { return e[1].fired > 0; }).forEach(function(e) {
    html += '<div class="sig-summary-chip" style="display:inline-flex;flex-direction:column;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:8px 14px;min-width:60px;flex:1"><span style="font-family:var(--mono);font-size:14px;font-weight:bold;line-height:1;color:var(--text)">' + e[0] + '</span><span style="font-size:8px;color:var(--text3);letter-spacing:1px;font-family:var(--mono);margin-top:3px">' + e[1].fired + ' sigs</span></div>';
  });
  bar.innerHTML = html;
}

function renderSigLog() {
  var log = document.getElementById('sig-log');
  if (!log) return;
  if (allSignals.length === 0) {
    log.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text3);font-family:var(--mono);font-size:11px">No signals yet today.<br>Signals fire at 70+ confidence during trading windows.</div>';
    return;
  }
  log.innerHTML = allSignals.map(function(sig) {
    var isCE = sig.type === 'BUY_CE';
    var inst = sig.instrument || 'SENSEX';
    var market = sig.market || (INSTRUMENTS[inst] ? INSTRUMENTS[inst].market : 'NSE');
    var confColor = sig.confidence >= 85 ? 'var(--green)' : sig.confidence >= 70 ? 'var(--amber)' : 'var(--red)';
    var entryPrem = sig.entryPremium ? 'Rs' + sig.entryPremium : '--';
    var target = sig.target ? 'Rs' + sig.target : '--';
    var sl = sig.sl ? 'Rs' + sig.sl : '--';
    return '<div class="sigcard ' + (isCE ? 'sigcard-ce' : 'sigcard-pe') + '"><div class="sigcard-head"><div><div style="display:inline-flex;align-items:center;gap:4px;margin-bottom:6px">' +
      '<span style="font-family:var(--display);font-size:14px;letter-spacing:1.5px;color:var(--text)">' + inst + '</span>' +
      '<span class="badge ' + (market === 'NSE' ? 'inst-nse' : 'inst-bse') + '">' + market + '</span></div>' +
      '<div class="sigcard-type ' + (isCE ? 'ce' : 'pe') + '">' + (isCE ? 'BUY CALL' : 'BUY PUT') + ' ' + (sig.strike || '') + '</div></div>' +
      '<div class="sigcard-time">#' + (sig.signalNum || '--') + ' &middot; ' + (sig.timeStr || '') + '<br>Spot: ' + (sig.price ? sig.price.toLocaleString('en-IN') : '--') + '</div></div>' +
      '<div style="padding:0 12px 10px;display:flex;align-items:center;gap:8px">' +
      '<div style="flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;transition:width 0.6s;background:' + confColor + ';width:' + sig.confidence + '%"></div></div>' +
      '<span style="font-size:10px;font-family:var(--mono);font-weight:bold;min-width:38px;text-align:right;color:' + confColor + '">' + sig.confidence + '%</span></div>' +
      '<div class="sigcard-grid"><div class="sigcard-cell"><div class="cell-lbl">ENTRY</div><div class="cell-val gold">' + entryPrem + '</div></div>' +
      '<div class="sigcard-cell"><div class="cell-lbl">TARGET</div><div class="cell-val green">' + target + '</div></div>' +
      '<div class="sigcard-cell"><div class="cell-lbl">SL</div><div class="cell-val red">' + sl + '</div></div></div></div>';
  }).join('');
}

function updateSigBadge() {
  var badge = document.getElementById('sig-count-badge');
  var dashBadge = document.getElementById('signal-badge');
  var fired = allSignals.filter(function(s) { return !s.nearMiss; }).length;
  if (badge) { badge.textContent = fired; badge.style.display = fired > 0 ? 'inline-block' : 'none'; }
  if (dashBadge) { dashBadge.textContent = fired; dashBadge.style.display = fired > 0 ? 'inline-flex' : 'none'; }
}

// ===== CLOCK & SESSION =====
function getIST() {
  return new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Kolkata'}));
}
function pad(n) { return String(n).padStart(2, '0'); }

var SESSIONS = [
  {id:'earlyam',  s:'00:00',e:'08:44',label:'MARKET CLOSED',  dot:'#344d6a',col:'dim',   desc:'Opens 9:15 AM IST'},
  {id:'premarket',s:'08:45',e:'09:14',label:'PRE-MARKET',     dot:'#F0A500',col:'gold',  desc:'Preparation time'},
  {id:'opening',  s:'09:15',e:'09:29',label:'OPENING GAP',    dot:'#ff3d5a',col:'red',   desc:'Watch only - no trade'},
  {id:'window1',  s:'09:30',e:'10:29',label:'WINDOW 1 OPEN',  dot:'#00e5a0',col:'green', desc:'Primary entry window'},
  {id:'midmorn',  s:'10:30',e:'11:59',label:'MID MORNING',    dot:'#4da6ff',col:'blue',  desc:'Continuation trades only'},
  {id:'lunch',    s:'12:00',e:'13:29',label:'LUNCH LULL',     dot:'#ff3d5a',col:'red',   desc:'No trades - theta decay'},
  {id:'window2',  s:'13:30',e:'14:29',label:'WINDOW 2 OPEN',  dot:'#00e5a0',col:'green', desc:'Second entry window'},
  {id:'closing',  s:'14:30',e:'15:29',label:'CLOSING',        dot:'#F0A500',col:'gold',  desc:'Exit all positions'},
  {id:'closed',   s:'15:30',e:'23:59',label:'MARKET CLOSED',  dot:'#344d6a',col:'dim',   desc:'Review and prepare'},
];

function getSession(ist) {
  var t = ist.getHours() * 100 + ist.getMinutes();
  for (var i = 0; i < SESSIONS.length; i++) {
    var s = SESSIONS[i];
    var sh = parseInt(s.s.split(':')[0]), sm = parseInt(s.s.split(':')[1]);
    var eh = parseInt(s.e.split(':')[0]), em = parseInt(s.e.split(':')[1]);
    if (t >= sh * 100 + sm && t <= eh * 100 + em) return s;
  }
  return SESSIONS[0];
}

var lastSessionId = null;
function updateClock() {
  try {
    var ist = getIST();
    var h = ist.getHours(), m = ist.getMinutes(), s = ist.getSeconds();
    var clockEl = document.getElementById('clock');
    if (clockEl) clockEl.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
    var DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    var MTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    var dateEl = document.getElementById('datestr');
    if (dateEl) dateEl.textContent = DAYS[ist.getDay()] + ' ' + ist.getDate() + ' ' + MTHS[ist.getMonth()];

    var sess = getSession(ist);
    var sribbon = document.getElementById('sribbon');
    if (sribbon) sribbon.style.background = sess.dot + '18';
    var dot = document.getElementById('sribbon-dot');
    if (dot) dot.style.background = sess.dot;
    var label = document.getElementById('sribbon-label');
    if (label) { label.style.color = sess.dot; label.textContent = sess.label; }
    var desc = document.getElementById('sribbon-desc');
    if (desc) desc.textContent = sess.desc;

    var idx = SESSIONS.findIndex(function(x) { return x.id === sess.id; });
    var next = SESSIONS[idx + 1];
    var timerEl = document.getElementById('sribbon-timer');
    if (next && timerEl) {
      var nh = parseInt(next.s.split(':')[0]), nm = parseInt(next.s.split(':')[1]);
      var nowMins = h * 60 + m;
      var nextMins = nh * 60 + nm;
      var diff = nextMins - nowMins;
      if (diff > 0 && diff <= 120) timerEl.textContent = diff + 'm -> ' + next.label;
      else timerEl.textContent = '';
    }

    if (currentTab === 'dash' && sess.id !== lastSessionId) {
      lastSessionId = sess.id;
      renderDash(sess);
    }
  } catch(e) {
    console.error('Clock error:', e);
  }
}

// ===== DASHBOARD =====

  earlyam:  {col:'dim',  title:'MARKET CLOSED',          body:'Review previous trade journal. Study price action. Prepare levels for today. Market opens at 9:15 AM IST.'},
  premarket:{col:'gold', title:'PRE-MARKET PREP',        body:'This window is for preparation only. No orders. Just observation and planning. Mark your reference levels now.'},
  opening:  {col:'red',  title:'DO NOT TRADE',           body:'Biggest mistake: trading this window. Wide spreads. Fake moves. Gap fills. Just mark the Opening Range and watch.'},
  window1:  {col:'green',title:'WINDOW 1 - TRADE NOW',  body:'Your best window of the day. Look for Opening Range Breakout on 5-min. Confirm 15-min direction first. ATM or 1-step ITM preferred.'},
  midmorn:  {col:'blue', title:'MID MORNING',            body:'First wave may be over. If daily target hit, close terminal now. Only trade if trend is clearly continuing. Very selective.'},
  lunch:    {col:'red',  title:'LUNCH LULL - STOP',     body:'Most dangerous time for option buyers. Theta decay is accelerating. Volume is low. Spreads widen. ZERO NEW POSITIONS.'},
  window2:  {col:'green',title:'WINDOW 2 - OPEN',       body:'Second opportunity of the day. FII/DII afternoon positioning creates moves. Same rules as Window 1. Note: theta is higher - be faster.'},
  closing:  {col:'gold', title:'CLOSING - EXIT ALL',    body:'2:30-3:30 PM is erratic and unpredictable. Expiry hedge unwinding causes sharp reversals. Exit all open positions before 3 PM.'},
  closed:   {col:'dim',  title:'END OF SESSION',        body:'Trading is over for today. Discipline in review = better tomorrow. Spend 15 minutes on honest reflection.'},
};

function renderDash(sess) {
  var inst = INST[sess.id] || INST.closed;
  var colorMap = {gold:'var(--gold)',green:'var(--green)',red:'var(--red)',blue:'var(--blue)',dim:'var(--text2)'};
  var area = document.getElementById('inst-area');
  if (!area) return;
  var isTradeable = sess.id === 'window1' || sess.id === 'window2';
  var isAvoid = sess.id === 'lunch' || sess.id === 'opening';
  var html = '<div class="inst-card ' + inst.col + '" style="margin-bottom:12px">' +
    '<div class="inst-title" style="color:' + colorMap[inst.col] + '">' + inst.title + '</div>' +
    '<div class="inst-body">' + inst.body + '</div></div>';
  if (isTradeable) {
    html += '<div class="signal go"><span class="signal-icon">&#10022;</span><div><div class="signal-text" style="color:var(--green)">ACTIVE TRADING WINDOW</div>' +
      '<div class="signal-sub">Entry signals valid - follow the checklist</div></div></div>';
  }
  if (isAvoid) {
    html += '<div class="signal no"><span class="signal-icon">&#10005;</span><div><div class="signal-text" style="color:var(--red)">NO TRADE ZONE</div>' +
      '<div class="signal-sub">' + sess.desc + '</div></div></div>';
  }
  area.innerHTML = html;
}

// ===== TAB SWITCHING =====
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.pane').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var pane = document.getElementById('pane-' + name);
  var tab = document.getElementById('tab-' + name);
  if (pane) pane.classList.add('active');
  if (tab) tab.classList.add('active');
  if (name === 'mkt') renderMarket();
  if (name === 'sig') renderSignalsTab();
  if (name === 'dash') { lastSessionId = null; updateClock(); renderAnalysis(); renderOIWalls(); renderTradeTracker(); renderMiniSigFeed(); }
}

// ===== CONN STATUS =====
function updateConnStatus(status, msg) {
  connStatus = status;
  var dot = document.getElementById('conn-dot');
  if (dot) dot.className = 'conn-dot ' + (status === 'live' ? 'live' : status === 'error' ? 'err' : 'wait');
  var bannerArea = document.getElementById('conn-banner-area');
  if (bannerArea && currentTab === 'dash') {
    if (status === 'live') {
      bannerArea.innerHTML = '<div class="conn-banner live">&#9679; ANGEL ONE LIVE - ' + msg + '</div>';
      setTimeout(function() { bannerArea.innerHTML = ''; }, 3000);
    } else if (status === 'error') {
      bannerArea.innerHTML = '<div class="conn-banner">&#9888; ' + msg + ' - Run: node server.js</div>';
    } else {
      bannerArea.innerHTML = '<div class="conn-banner waiting">&#9680; ' + msg + '</div>';
    }
  }
}

// ===== INIT =====
updateClock();
setInterval(updateClock, 1000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function() {});
connectWS();
